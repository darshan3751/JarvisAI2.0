name: Jarvis AI 2.0 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install groq python-dotenv youtubesearchpython requests

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Import check
        run: |
          python -c "from Backend.Brain import decide; print('Brain OK')"
          python -c "from Backend.YouTubePlayer import PlayYouTubeSong; print('YouTube OK')"
